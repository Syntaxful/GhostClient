<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="Eaglercraft 1.12 WASM-GC test directory HTML page" />
		<meta name="keywords" content="eaglercraftminecraft, 1.12, 1.12.2" />
		<title>Eaglercraft 1.12 WASM-GC</title>
		<meta property="og:locale" content="en-US" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Eaglercraft 1.12 WASM-GC" />
		<meta property="og:description" content="test directory HTML page" />
		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		<script type="text/javascript">
			"use strict";
			window.addEventListener("load", async function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
					return;
				}
				if(typeof WebAssembly.Suspending === "undefined") {
					var div = document.createElement("div");
					div.style.width = "100%";
					div.style.height = "100%";
					div.style.display = "flex";
					div.style.alignItems = "center";
					div.style.justifyContent = "center";
					div.style.flexDirection = "column";
					div.style.backgroundColor = "#000000";
					div.style.color = "#FFFFFF";
					div.style.fontFamily = "sans-serif";
					div.innerHTML = "<h1 style='margin:0;font-size:48px;letter-spacing:2px;'>GhostClient</h1><p style='margin:8px 0 24px;color:#AAAAAA;'>made by Syntaxful</p><p style='color:#FF5555;max-width:80%;text-align:center;'>JSPI is not enabled. Please enable it in chrome://flags and reload.</p>";
					document.body.appendChild(div);
					alert("JSPI is not enabled, please enable it in chrome://flags");
					return;
				}

				const splash = document.createElement("div");
				splash.id = "_gc_splash";
				splash.style.width = "100%";
				splash.style.height = "100%";
				splash.style.display = "flex";
				splash.style.alignItems = "center";
				splash.style.justifyContent = "center";
				splash.style.flexDirection = "column";
				splash.style.backgroundColor = "#000000";
				splash.style.color = "#FFFFFF";
				splash.style.fontFamily = "sans-serif";
				splash.innerHTML = "<h1 style='margin:0;font-size:48px;letter-spacing:2px;'>GhostClient</h1><p style='margin:8px 0 24px;color:#AAAAAA;'>made by Syntaxful</p><div style='width:40px;height:40px;border:3px solid #333;border-top:3px solid #FFF;border-radius:50%;animation:spin 1s linear infinite;'></div><p id='_gc_status' style='margin-top:24px;color:#AAAAAA;font-size:14px;'>Loading...</p>";
				document.body.appendChild(splash);

				const spin = document.createElement("style");
				spin.innerHTML = "@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}";
				document.head.appendChild(spin);

				function setStatus(text) {
					const s = document.getElementById("_gc_status");
					if (s) s.textContent = text;
				}

				setStatus("Downloading assets...");
				console.log("Downloading assets.epk...");
				var assetsEPK;
				try {
					assetsEPK = new Uint8Array(await fetch("assets.epk").then(resp => resp.arrayBuffer()));
				}catch(ex) {
					setStatus("Could not download assets.epk");
					console.error("Could not download assets.epk!");
					console.error(ex);
					alert("Could not download assets.epk!");
					return;
				}
				console.log("Downloaded " + assetsEPK.length + " byte file");
				setStatus("Assets loaded. Starting...");

				const relayId = Math.floor(Math.random() * 3);
				const eaglercraftXOpts = {
					demoMode: false,
					localesURI: "lang/",
					worldsDB: "worlds",
					servers: [
						{ addr: "ws://localhost:8081/", name: "Local test server" }
					],
					relays: [
						{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId === 0 },
						{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId === 1 },
						{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId === 2 }
					]
				};

				window.__eaglercraftXLoaderContext = {
					getEaglercraftXOpts: function() {
						return eaglercraftXOpts;
					},
					getEagRuntimeJSURL: function() {
						return "eagruntime.js";
					},
					getClassesWASMURL: function() {
						return "classes.wasm";
					},
					getClassesDeobfWASMURL: function() {
						return "classes.wasm-deobfuscator.wasm";
					},
					getClassesTEADBGURL: function() {
						return "classes.wasm.teadbg";
					},
					getEPKFiles: function() {
						return [{
							name: "assets.epk",
							path: "",
							data: assetsEPK
						}];
					},
					getRootElement: function() {
						return document.body;
					},
					getMainArgs: function() {
						return [];
					},
					getImageURL: function(idx) {
						switch(idx) {
						case 0:
							return "splash.png";
						case 1:
							return "pressAnyKey.png";
						case 2:
							return "crashLogo.png";
						case 3:
							return "favicon.png";
						default:
							return null;
						}
					},
					runMain: function(fn) {
						setTimeout(function() {
							setStatus("Launching...");
							fn();
							setTimeout(function() {
								const s = document.getElementById("_gc_splash");
								if (s && s.parentNode) s.parentNode.removeChild(s);
							}, 1500);
						}, 10);
					}
				};

				var q = window.location.search;
				if((typeof q === "string") && q[0] === "?" && (typeof URLSearchParams !== "undefined")) {
					q = new URLSearchParams(q);
					var s = q.get("server");
					if(s) eaglercraftXOpts.joinServer = s;
				}

				const scriptElement = document.createElement("script");
				scriptElement.type = "text/javascript";
				scriptElement.src = "eagruntime.js";
				scriptElement.onerror = function() {
					setStatus("Failed to load eagruntime.js");
					console.error("Failed to load eagruntime.js");
				};
				document.head.appendChild(scriptElement);
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
